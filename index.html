<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Collector Hub | Uniform Card Layout</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0b0d;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    color: #f0f0f0;
    padding-bottom: 40px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 16px;
}

h2 {
    text-align: center;
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e2c28b, #c8a45a);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    padding: 24px 10px 16px;
}

/* Two separate boxes layout */
.control-panel {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    background: #0f0f12;
    border-radius: 28px;
    padding: 16px 24px;
    margin: 12px 0 20px;
    border: 1px solid #23232a;
}

.category-section {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
}

.cat-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.btn {
    padding: 8px 20px;
    background: #15151c;
    border: 1px solid #2c2c34;
    color: #e2e2e8;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    white-space: nowrap;
}

.btn:hover {
    background: #22222b;
    border-color: #c8a45a;
    color: #ffffff;
}

.activeCat {
    background: #c8a45a;
    color: #0a0a0c;
    border-color: #c8a45a;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(200,164,90,0.3);
}

.search-section {
    background: #0a0a0e;
    border-radius: 60px;
    border: 1px solid #2c2c34;
    padding: 4px 8px 4px 20px;
    min-width: 240px;
    transition: all 0.2s;
}

.search-section:focus-within {
    border-color: #c8a45a;
    box-shadow: 0 0 0 3px rgba(200,164,90,0.2);
}

.search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
}

.search-icon {
    font-size: 1rem;
    color: #b0b0bc;
}

#searchInput {
    background: transparent;
    border: none;
    color: white;
    font-size: 0.9rem;
    padding: 10px 0;
    width: 220px;
    outline: none;
    font-family: inherit;
}

#searchInput::placeholder {
    color: #6a6a78;
    font-weight: 400;
}

.clear-search {
    background: none;
    border: none;
    color: #9a9aaa;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0 8px;
    border-radius: 30px;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.clear-search:hover {
    color: #c8a45a;
    background: #20202a;
}

.search-status {
    text-align: center;
    font-size: 0.8rem;
    color: #aaa;
    margin: 8px 0 16px;
    padding: 6px 12px;
    background: #0c0c10;
    border-radius: 40px;
    border: 1px solid #202026;
    display: inline-block;
    width: auto;
    margin-left: auto;
    margin-right: auto;
}

/* Grid layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    padding: 12px 0 40px;
}

/* Card design - FLEX COLUMN for consistent button alignment */
.card {
    background: #131318;
    border-radius: 24px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    border: 1px solid #24242c;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 30px rgba(0,0,0,0.6);
    border-color: #3d3d4a;
}

.slider {
    position: relative;
    background: #09090c;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

.slider img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    transition: opacity 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.slider img.active {
    display: block;
    animation: smoothFade 0.4s ease-out;
}

@keyframes smoothFade {
    0% { opacity: 0.5; transform: scale(1.02); }
    100% { opacity: 1; transform: scale(1); }
}

.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    color: white;
    border: none;
    width: 30px;
    height: 34px;
    border-radius: 40px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s;
    opacity: 0.6;
    z-index: 2;
}

.nav-btn:hover {
    background: #c8a45a;
    color: black;
    opacity: 1;
}

.nav-left {
    left: 8px;
}
.nav-right {
    right: 8px;
}

/* Card content - FLEX GROW to push button to bottom */
.card-content {
    padding: 14px 12px 16px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

/* Title: max 2 lines, fixed height to ensure consistency */
.title {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.35;
    color: #f0f0f5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 2.3em;
    margin-bottom: 12px;
    flex-shrink: 0;
}

/* Buy button - stays at bottom, aligned across all cards */
.buy-link {
    display: inline-block;
    background: #c8a45a;
    color: #0a0a0c;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 700;
    text-decoration: none;
    transition: 0.2s;
    letter-spacing: 0.4px;
    text-align: center;
    width: fit-content;
    margin-top: auto;
    align-self: flex-start;
}

.buy-link:hover {
    background: #e0bc7c;
    transform: scale(1.02);
}

.empty-message {
    text-align: center;
    padding: 70px 20px;
    color: #b0b0c0;
    font-size: 1rem;
    background: #0f0f14;
    border-radius: 48px;
    margin-top: 30px;
    border: 1px dashed #3a3a44;
}

/* Responsive */
@media (max-width: 780px) {
    .control-panel {
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
        padding: 16px;
    }
    .category-section {
        justify-content: center;
        width: 100%;
    }
    .cat-buttons {
        justify-content: center;
        width: 100%;
    }
    .search-section {
        width: 100%;
    }
    #searchInput {
        width: 100%;
    }
    .search-wrapper {
        width: 100%;
    }
    .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
    }
    .title {
        font-size: 0.75rem;
    }
}
</style>

title:"Acrylic Display Case",
link:"#",
imgs:["https://i.imgur.com/toEM4X4.jpg"]
}
];

// ========== GLOBALS ==========
let currentCategory = "Anime";
let globalSearchQuery = "";
let autoSlideIntervals = new Map();

const containerEl = document.getElementById("container");
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearSearchBtn");
const searchStatusSpan = document.getElementById("searchStatus");

function getFilteredProducts() {
    let productsAfterSearch = data;
    if (globalSearchQuery.trim() !== "") {
        const query = globalSearchQuery.trim().toLowerCase();
        productsAfterSearch = data.filter(item => item.title.toLowerCase().includes(query));
    }
    return productsAfterSearch.filter(item => item.cat === currentCategory);
}

function clearAllAutoSlides() {
    for (let intervalId of autoSlideIntervals.values()) {
        clearInterval(intervalId);
    }
    autoSlideIntervals.clear();
}

function startAutoSlide(sliderElement) {
    if (!sliderElement) return;
    if (autoSlideIntervals.has(sliderElement)) {
        clearInterval(autoSlideIntervals.get(sliderElement));
        autoSlideIntervals.delete(sliderElement);
    }
    const imgs = sliderElement.querySelectorAll("img");
    if (imgs.length <= 1) return;
    
    const intervalId = setInterval(() => {
        if (!sliderElement.isConnected) {
            clearInterval(intervalId);
            autoSlideIntervals.delete(sliderElement);
            return;
        }
        const currentImgs = sliderElement.querySelectorAll("img");
        if (currentImgs.length === 0) return;
        let currentIdx = parseInt(sliderElement.dataset.i) || 0;
        currentImgs[currentIdx].classList.remove("active");
        currentIdx = (currentIdx + 1) % currentImgs.length;
        currentImgs[currentIdx].classList.add("active");
        sliderElement.dataset.i = currentIdx;
    }, 3000);
    
    autoSlideIntervals.set(sliderElement, intervalId);
}

function slide(cardElement, direction) {
    const imgs = cardElement.querySelectorAll("img");
    if (!imgs.length) return;
    let currentIdx = parseInt(cardElement.dataset.i) || 0;
    imgs[currentIdx].classList.remove("active");
    currentIdx += direction;
    if (currentIdx < 0) currentIdx = imgs.length - 1;
    if (currentIdx >= imgs.length) currentIdx = 0;
    imgs[currentIdx].classList.add("active");
    cardElement.dataset.i = currentIdx;
    
    if (autoSlideIntervals.has(cardElement)) {
        clearInterval(autoSlideIntervals.get(cardElement));
        autoSlideIntervals.delete(cardElement);
        startAutoSlide(cardElement);
    }
}

function render() {
    clearAllAutoSlides();
    const filtered = getFilteredProducts();
    containerEl.innerHTML = "";
    
    if (globalSearchQuery.trim() !== "") {
        const resultCount = filtered.length;
        searchStatusSpan.innerHTML = `🔍 Found ${resultCount} result${resultCount !== 1 ? 's' : ''} for "${escapeHtml(globalSearchQuery)}" in ${currentCategory}`;
        searchStatusSpan.style.display = "block";
    } else {
        searchStatusSpan.innerHTML = "";
        searchStatusSpan.style.display = "none";
    }
    
    if (filtered.length === 0) {
        const emptyDiv = document.createElement("div");
        emptyDiv.className = "empty-message";
        if (globalSearchQuery.trim() !== "") {
            emptyDiv.innerHTML = `🔎 No products matching "${escapeHtml(globalSearchQuery)}" in ${currentCategory}. Try another category or clear search.`;
        } else {
            emptyDiv.innerHTML = `✨ No items in ${currentCategory} category.`;
        }
        containerEl.appendChild(emptyDiv);
        return;
    }
    
    filtered.forEach(product => {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        
        let imagesHtml = "";
        if (product.imgs && product.imgs.length) {
            product.imgs.forEach((imgSrc, i) => {
                if (imgSrc && imgSrc.trim() !== "") {
                    const activeClass = (i === 0) ? "active" : "";
                    imagesHtml += `<img src="${imgSrc}" class="${activeClass}" loading="lazy" alt="${escapeHtml(product.title)}">`;
                }
            });
        }
        if (!imagesHtml) {
            imagesHtml = `<div style="background:#1e1e26; height:100%; display:flex; align-items:center; justify-content:center; color:#aaa;">📷 No preview</div>`;
        }
        
        cardDiv.innerHTML = `
            <div style="position:relative;">
                <div class="slider" data-i="0">
                    ${imagesHtml}
                </div>
                <button class="nav-btn nav-left" onclick="slide(this.parentElement.querySelector('.slider'), -1)">‹</button>
                <button class="nav-btn nav-right" onclick="slide(this.parentElement.querySelector('.slider'), 1)">›</button>
            </div>
            <div class="card-content">
                <div class="title">${escapeHtml(product.title)}</div>
                <a href="${product.link}" class="buy-link" target="_blank" rel="noopener noreferrer">Buy Now</a>
            </div>
        `;
        containerEl.appendChild(cardDiv);
    });
    
    const sliders = document.querySelectorAll(".slider");
    sliders.forEach(slider => {
        if (slider.querySelectorAll("img").length > 1) {
            startAutoSlide(slider);
        }
    });
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function refreshUI() {
    render();
}

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll(".btn[data-cat]").forEach(btn => {
        if (btn.getAttribute("data-cat") === cat) {
            btn.classList.add("activeCat");
        } else {
            btn.classList.remove("activeCat");
        }
    });
    refreshUI();
}

function handleGlobalSearch() {
    globalSearchQuery = searchInput.value;
    refreshUI();
}

function clearSearch() {
    searchInput.value = "";
    globalSearchQuery = "";
    refreshUI();
    searchInput.focus();
}

function bindEvents() {
    const catButtons = document.querySelectorAll(".btn[data-cat]");
    catButtons.forEach(btn => {
        btn.addEventListener("click", (e) => {
            const cat = btn.getAttribute("data-cat");
            setCategory(cat);
        });
    });
    searchInput.addEventListener("input", handleGlobalSearch);
    clearBtn.addEventListener("click", clearSearch);
    searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Escape") clearSearch();
    });
}

function init() {
    currentCategory = "Anime";
    globalSearchQuery = "";
    searchInput.value = "";
    bindEvents();
    document.querySelectorAll(".btn[data-cat]").forEach(btn => {
        if (btn.getAttribute("data-cat") === "Anime") btn.classList.add("activeCat");
        else btn.classList.remove("activeCat");
    });
    refreshUI();
}

window.slide = slide;
init();
</script>
</body>
</html>
